<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录侨批生成器</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: #25180f;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 12%, rgba(255,255,255,.64), transparent 23rem),
        linear-gradient(135deg, #d7a36f, #f1d6a8 46%, #a86245);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .login-shell {
      width: min(100%, 980px);
      min-height: 560px;
      display: grid;
      grid-template-columns: 1fr 380px;
      background: rgba(255,250,238,.9);
      border: 1px solid rgba(96,55,29,.24);
      border-radius: 8px;
      box-shadow: 0 28px 80px rgba(62,30,12,.28);
      overflow: hidden;
    }
    .poster {
      position: relative;
      min-height: 560px;
      background:
        linear-gradient(90deg, transparent 0 38%, rgba(196,73,62,.88) 38% 66%, transparent 66%),
        radial-gradient(circle at 43% 18%, rgba(133,55,38,.14), transparent 18%),
        repeating-linear-gradient(86deg, rgba(80,48,25,.045) 0 2px, transparent 2px 8px),
        #e6d3ae;
      border-right: 1px solid rgba(96,55,29,.18);
    }
    .poster:before {
      content: "银信";
      position: absolute;
      top: 6%;
      left: 6%;
      transform: rotate(8deg);
      border: 2px solid #596067;
      background: #eee9dc;
      color: #1f2a34;
      font-family: "KaiTi", "楷体", serif;
      font-size: 30px;
      font-weight: 700;
      padding: 2px 10px;
    }
    .poster:after {
     content: "纸短情长 伏惟珍重";
    white-space: pre;
    position: absolute;
    right: 11%;
    top: 18%;
    writing-mode: vertical-rl;
    text-orientation: upright;
    color: rgba(43,31,22,.34);
    border: 2px solid rgba(83,68,53,.24);
    border-radius: 10px;
    padding: 18px 9px;
    font-family: "KaiTi", "楷体", serif;
    font-size: 38px;
    line-height: 1;
    }
    .poster-title {
      position: absolute;
      left: 50%;
      top: 112px;
      transform: translateX(-50%);
      writing-mode: vertical-rl;
      text-orientation: upright;
      font-family: "华文行楷", "STXingkai", "KaiTi", "楷体", serif;
      font-size: 88px;
      font-weight: 900;
      line-height: .95;
      color: #140b08;
    }
    .poster-name {
      position: absolute;
      left: 14%;
      top: 25%;
      writing-mode: vertical-rl;
      text-orientation: upright;
      font-family: "华文行楷", "STXingkai", "KaiTi", "楷体", serif;
      font-size: 65px;
      line-height: 1.1;
      color: #21140d;
    }
    .panel {
      display: grid;
      align-content: center;
      padding: 38px;
      background: rgba(255,253,246,.82);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      letter-spacing: 0;
    }
    .sub {
      margin: 0 0 26px;
      color: #76533b;
      line-height: 1.6;
      font-size: 14px;
    }
    .field { display: grid; gap: 7px; margin-bottom: 14px; }
    label {
      color: #5b422f;
      font-size: 13px;
      font-weight: 800;
    }
    input {
      width: 100%;
      border: 1px solid #c69b71;
      border-radius: 6px;
      background: #fffdf7;
      color: #21160f;
      padding: 12px 12px;
      outline: none;
    }
    input:focus { border-color: #9d4e3f; box-shadow: 0 0 0 3px rgba(157,78,63,.16); }
    .password-wrap {
      position: relative;
    }
    .password-wrap input {
      padding-right: 58px;
    }
    .password-toggle {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 34px;
      height: 30px;
      min-height: 30px;
      margin: 0;
      padding: 0;
      border: 1px solid #c69b71;
      border-radius: 6px;
      background: #fff6e8;
      color: #71432f;
      display: grid;
      place-items: center;
      line-height: 1;
    }
    .password-toggle:hover {
      background: #ffeed6;
      border-color: #9d4e3f;
      color: #4b2d1f;
    }
    .password-icon {
      grid-area: 1 / 1;
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .password-toggle .eye-open {
      display: none;
    }
    .password-toggle.is-visible .eye-open {
      display: block;
    }
    .password-toggle.is-visible .eye-closed {
      display: none;
    }
    .error {
      margin: 0 0 14px;
      padding: 10px 12px;
      border-radius: 6px;
      background: #fff0ed;
      color: #9b2f22;
      border: 1px solid #e0a097;
      font-size: 13px;
    }
    button {
      width: 100%;
      min-height: 44px;
      border: 0;
      border-radius: 6px;
      background: #2a1a11;
      color: #fff8eb;
      font-weight: 800;
      cursor: pointer;
      margin-top: 6px;
    }
    .auth-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 8px 0 0;
    }
    .auth-actions button {
      margin-top: 0;
    }
    .auth-actions a {
      min-height: 44px;
      display: grid;
      place-items: center;
      color: #71432f;
      text-decoration: none;
      border: 1px solid #c79d77;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 800;
      background: #fffaf0;
    }
    .auth-actions a:hover {
      border-color: #9d4e3f;
      color: #4b2d1f;
      background: #fff4df;
    }
    .switcher {
      display: flex;
      gap: 8px;
      margin-top: 18px;
      flex-wrap: wrap;
    }
    .switcher a {
      color: #71432f;
      text-decoration: none;
      border: 1px solid #c79d77;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
    }
    .switcher a.active {
      background: #2a1a11;
      color: #fff8eb;
      border-color: #2a1a11;
    }
    body.minimal {
      background: linear-gradient(135deg, #fbf5ea, #d8b184);
    }
    body.minimal .login-shell {
      width: min(100%, 420px);
      min-height: auto;
      display: block;
    }
    body.minimal .poster { display: none; }
    body.minimal .panel { padding: 34px; }
    body.poster .login-shell {
      grid-template-columns: 1.15fr 360px;
      background: rgba(53,28,17,.76);
    }
    body.poster .panel {
      color: #fff8eb;
      background: rgba(32,18,12,.84);
    }
    body.poster .sub,
    body.poster label { color: #f1d7b3; }
    body.poster input {
      background: rgba(255,248,233,.96);
    }
    body.poster .switcher a {
      color: #ffe8c4;
      border-color: rgba(255,232,196,.42);
    }
    body.poster .switcher a.active {
      background: #ffe8c4;
      color: #27170f;
      border-color: #ffe8c4;
    }
    body.poster .auth-actions a {
      color: #ffe8c4;
      border-color: rgba(255,232,196,.42);
      background: transparent;
    }
    body.poster .auth-actions a:hover {
      color: #27170f;
      background: #ffe8c4;
      border-color: #ffe8c4;
    }
    @media (max-width: 760px) {
      body { padding: 14px; }
      .login-shell {
        grid-template-columns: 1fr;
        min-height: auto;
      }
      .poster {
        min-height: 260px;
      }
      .poster-title { top: 38px; font-size: 64px; }
      .poster-name { top: 52px; left: 38px; font-size: 60px; }
      .poster:after { display: none; }
      .panel { padding: 28px; }
    }
  </style>
</head>
<body class="{{ variant }}">
  <main class="login-shell">
    <section class="poster" aria-hidden="true">
      <div class="poster-name">亲启</div>
      <div class="poster-title">平安批</div>
    </section>
    <section class="panel">
      <h1>侨批生成器</h1>
      <p class="sub">{{ '使用手机号码或邮箱注册账号。' if mode == 'register' else '登录后可生成、编辑和发布侨批分享页。' }}</p>
      {% if mode == 'register' %}
      <form method="post" action="/register">
        <input type="hidden" name="next" value="{{ next_path }}">
        <input type="hidden" name="variant" value="{{ variant }}">
        <div class="field">
          <label for="identity">手机号码 / 邮箱</label>
          <input id="identity" name="identity" autocomplete="username" required autofocus>
        </div>
        <div class="field">
          <label for="password">密码</label>
          <div class="password-wrap">
            <input id="password" name="password" type="password" autocomplete="new-password" required>
            <button class="password-toggle" type="button" data-toggle-password="password" aria-label="显示密码" aria-pressed="false" title="显示密码">
              <svg class="password-icon eye-open" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg class="password-icon eye-closed" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M10.7 5.1A10.5 10.5 0 0 1 12 5c6.5 0 10 7 10 7a17.7 17.7 0 0 1-2.1 3.1"></path>
                <path d="M6.6 6.6C3.6 8.6 2 12 2 12s3.5 7 10 7a10.6 10.6 0 0 0 5.4-1.6"></path>
                <path d="M9.9 9.9a3 3 0 0 0 4.2 4.2"></path>
                <path d="M3 3l18 18"></path>
              </svg>
            </button>
          </div>
        </div>
        <div class="field">
          <label for="passwordConfirm">确认密码</label>
          <div class="password-wrap">
            <input id="passwordConfirm" name="password_confirm" type="password" autocomplete="new-password" required>
            <button class="password-toggle" type="button" data-toggle-password="passwordConfirm" aria-label="显示密码" aria-pressed="false" title="显示密码">
              <svg class="password-icon eye-open" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg class="password-icon eye-closed" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M10.7 5.1A10.5 10.5 0 0 1 12 5c6.5 0 10 7 10 7a17.7 17.7 0 0 1-2.1 3.1"></path>
                <path d="M6.6 6.6C3.6 8.6 2 12 2 12s3.5 7 10 7a10.6 10.6 0 0 0 5.4-1.6"></path>
                <path d="M9.9 9.9a3 3 0 0 0 4.2 4.2"></path>
                <path d="M3 3l18 18"></path>
              </svg>
            </button>
          </div>
        </div>
        {% if error %}
        <p class="error">注册错误：{{ error }}</p>
        {% endif %}
        <div class="auth-actions">
          <a href="/login?next={{ next_path }}">登录</a>
          <button type="submit">注册并登录</button>
        </div>
      </form>
      {% else %}
      <form method="post" action="/login">
        <input type="hidden" name="next" value="{{ next_path }}">
        <input type="hidden" name="variant" value="{{ variant }}">
        <div class="field">
          <label for="username">手机号码 / 邮箱 / 管理员用户名</label>
          <input id="username" name="username" autocomplete="username" required autofocus>
        </div>
        <div class="field">
          <label for="password">密码</label>
          <div class="password-wrap">
            <input id="password" name="password" type="password" autocomplete="current-password" required>
            <button class="password-toggle" type="button" data-toggle-password="password" aria-label="显示密码" aria-pressed="false" title="显示密码">
              <svg class="password-icon eye-open" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg class="password-icon eye-closed" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M10.7 5.1A10.5 10.5 0 0 1 12 5c6.5 0 10 7 10 7a17.7 17.7 0 0 1-2.1 3.1"></path>
                <path d="M6.6 6.6C3.6 8.6 2 12 2 12s3.5 7 10 7a10.6 10.6 0 0 0 5.4-1.6"></path>
                <path d="M9.9 9.9a3 3 0 0 0 4.2 4.2"></path>
                <path d="M3 3l18 18"></path>
              </svg>
            </button>
          </div>
        </div>
        {% if error %}
        <p class="error">登录错误：{{ error }}</p>
        {% endif %}
        <div class="auth-actions">
          <button type="submit">登录</button>
          <a href="/register?next={{ next_path }}">注册</a>
        </div>
      </form>
      {% endif %}
      <nav class="switcher" aria-label="登录页样式">
        <a class="{{ 'active' if variant == 'classic' else '' }}" href="/login?next={{ next_path }}">经典</a>
        <a class="{{ 'active' if variant == 'minimal' else '' }}" href="/login/minimal?next={{ next_path }}">极简</a>
        <a class="{{ 'active' if variant == 'poster' else '' }}" href="/login/poster?next={{ next_path }}">海报</a>
      </nav>
    </section>
  </main>
  <script>
    document.querySelectorAll("[data-toggle-password]").forEach((button) => {
      button.addEventListener("click", () => {
        const input = document.getElementById(button.dataset.togglePassword);
        if (!input) return;
        const shouldShow = input.type === "password";
        input.type = shouldShow ? "text" : "password";
        button.classList.toggle("is-visible", shouldShow);
        button.setAttribute("aria-label", shouldShow ? "隐藏密码" : "显示密码");
        button.setAttribute("aria-pressed", shouldShow ? "true" : "false");
        button.title = shouldShow ? "隐藏密码" : "显示密码";
      });
    });
  </script>
</body>
</html>
