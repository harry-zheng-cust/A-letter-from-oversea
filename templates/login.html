<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录侨批生成器</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: #25180f;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 12%, rgba(255,255,255,.64), transparent 23rem),
        linear-gradient(135deg, #d7a36f, #f1d6a8 46%, #a86245);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .login-shell {
      width: min(100%, 980px);
      min-height: 560px;
      display: grid;
      grid-template-columns: 1fr 380px;
      background: rgba(255,250,238,.9);
      border: 1px solid rgba(96,55,29,.24);
      border-radius: 8px;
      box-shadow: 0 28px 80px rgba(62,30,12,.28);
      overflow: hidden;
    }
    .poster {
      position: relative;
      min-height: 560px;
      background:
        linear-gradient(90deg, transparent 0 38%, rgba(196,73,62,.88) 38% 66%, transparent 66%),
        radial-gradient(circle at 43% 18%, rgba(133,55,38,.14), transparent 18%),
        repeating-linear-gradient(86deg, rgba(80,48,25,.045) 0 2px, transparent 2px 8px),
        #e6d3ae;
      border-right: 1px solid rgba(96,55,29,.18);
    }
    .poster:before {
      content: "银信";
      position: absolute;
      top: 6%;
      left: 6%;
      transform: rotate(8deg);
      border: 2px solid #596067;
      background: #eee9dc;
      color: #1f2a34;
      font-family: "KaiTi", "楷体", serif;
      font-size: 30px;
      font-weight: 700;
      padding: 2px 10px;
    }
    .poster:after {
     content: "纸短情长 伏惟珍重";
    white-space: pre;
    position: absolute;
    right: 11%;
    top: 18%;
    writing-mode: vertical-rl;
    text-orientation: upright;
    color: rgba(43,31,22,.34);
    border: 2px solid rgba(83,68,53,.24);
    border-radius: 10px;
    padding: 18px 9px;
    font-family: "KaiTi", "楷体", serif;
    font-size: 38px;
    line-height: 1;
    }
    .poster-title {
      position: absolute;
      left: 50%;
      top: 112px;
      transform: translateX(-50%);
      writing-mode: vertical-rl;
      text-orientation: upright;
      font-family: "华文行楷", "STXingkai", "KaiTi", "楷体", serif;
      font-size: 88px;
      font-weight: 900;
      line-height: .95;
      color: #140b08;
    }
    .poster-name {
      position: absolute;
      left: 14%;
      top: 25%;
      writing-mode: vertical-rl;
      text-orientation: upright;
      font-family: "华文行楷", "STXingkai", "KaiTi", "楷体", serif;
      font-size: 65px;
      line-height: 1.1;
      color: #21140d;
    }
    .panel {
      display: grid;
      align-content: center;
      padding: 38px;
      background: rgba(255,253,246,.82);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 26px;
      letter-spacing: 0;
    }
    .sub {
      margin: 0 0 26px;
      color: #76533b;
      line-height: 1.6;
      font-size: 14px;
    }
    .field { display: grid; gap: 7px; margin-bottom: 14px; }
    label {
      color: #5b422f;
      font-size: 13px;
      font-weight: 800;
    }
    input {
      width: 100%;
      border: 1px solid #c69b71;
      border-radius: 6px;
      background: #fffdf7;
      color: #21160f;
      padding: 12px 12px;
      outline: none;
    }
    input:focus { border-color: #9d4e3f; box-shadow: 0 0 0 3px rgba(157,78,63,.16); }
    .error {
      margin: 0 0 14px;
      padding: 10px 12px;
      border-radius: 6px;
      background: #fff0ed;
      color: #9b2f22;
      border: 1px solid #e0a097;
      font-size: 13px;
    }
    button {
      width: 100%;
      min-height: 44px;
      border: 0;
      border-radius: 6px;
      background: #2a1a11;
      color: #fff8eb;
      font-weight: 800;
      cursor: pointer;
      margin-top: 6px;
    }
    .switcher {
      display: flex;
      gap: 8px;
      margin-top: 18px;
      flex-wrap: wrap;
    }
    .switcher a {
      color: #71432f;
      text-decoration: none;
      border: 1px solid #c79d77;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
    }
    .switcher a.active {
      background: #2a1a11;
      color: #fff8eb;
      border-color: #2a1a11;
    }
    body.minimal {
      background: linear-gradient(135deg, #fbf5ea, #d8b184);
    }
    body.minimal .login-shell {
      width: min(100%, 420px);
      min-height: auto;
      display: block;
    }
    body.minimal .poster { display: none; }
    body.minimal .panel { padding: 34px; }
    body.poster .login-shell {
      grid-template-columns: 1.15fr 360px;
      background: rgba(53,28,17,.76);
    }
    body.poster .panel {
      color: #fff8eb;
      background: rgba(32,18,12,.84);
    }
    body.poster .sub,
    body.poster label { color: #f1d7b3; }
    body.poster input {
      background: rgba(255,248,233,.96);
    }
    body.poster .switcher a {
      color: #ffe8c4;
      border-color: rgba(255,232,196,.42);
    }
    body.poster .switcher a.active {
      background: #ffe8c4;
      color: #27170f;
      border-color: #ffe8c4;
    }
    @media (max-width: 760px) {
      body { padding: 14px; }
      .login-shell {
        grid-template-columns: 1fr;
        min-height: auto;
      }
      .poster {
        min-height: 260px;
      }
      .poster-title { top: 38px; font-size: 64px; }
      .poster-name { top: 52px; left: 38px; font-size: 60px; }
      .poster:after { display: none; }
      .panel { padding: 28px; }
    }
  </style>
</head>
<body class="{{ variant }}">
  <main class="login-shell">
    <section class="poster" aria-hidden="true">
      <div class="poster-name">亲启</div>
      <div class="poster-title">平安批</div>
    </section>
    <section class="panel">
      <h1>侨批生成器</h1>
      <p class="sub">登录后可生成、编辑和发布侨批分享页。</p>
      {% if error %}
        <p class="error">{{ error }}</p>
      {% endif %}
      <form method="post" action="/login">
        <input type="hidden" name="next" value="{{ next_path }}">
        <input type="hidden" name="variant" value="{{ variant }}">
        <div class="field">
          <label for="username">用户名</label>
          <input id="username" name="username" autocomplete="username" required autofocus>
        </div>
        <div class="field">
          <label for="password">密码</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <button type="submit">登录</button>
      </form>
      <nav class="switcher" aria-label="登录页样式">
        <a class="{{ 'active' if variant == 'classic' else '' }}" href="/login?next={{ next_path }}">经典</a>
        <a class="{{ 'active' if variant == 'minimal' else '' }}" href="/login/minimal?next={{ next_path }}">极简</a>
        <a class="{{ 'active' if variant == 'poster' else '' }}" href="/login/poster?next={{ next_path }}">海报</a>
      </nav>
    </section>
  </main>
</body>
</html>
